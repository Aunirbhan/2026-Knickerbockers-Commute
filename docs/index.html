<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sports Lights Up NYC Transit</title>
    <link rel="stylesheet" href="app.css" />
    <script
      src="https://cdn.plot.ly/plotly-2.35.2.min.js"
      charset="utf-8"
    ></script>
  </head>
  <body>
    <div id="map"></div>

    <header id="topbar">
      <div class="brand">
        <span class="dot"></span>
        <select id="eventSelect" aria-label="Event"></select>
      </div>
      <div class="stats">
        <div class="stat">
          <span class="num" id="statRiders">—</span
          ><span class="lbl">riders this hour</span>
        </div>
        <div class="stat">
          <span class="num" id="statRevenue">—</span
          ><span class="lbl">est. fare revenue</span>
        </div>
        <div class="stat">
          <span class="num" id="statClock">—</span
          ><span class="lbl" id="statDay">—</span>
        </div>
        <button id="dataToggle" aria-label="Toggle day comparison charts">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 3v18h18" />
            <path d="M18 17V9" />
            <path d="M13 17V5" />
            <path d="M8 17v-3" />
          </svg>
        </button>
      </div>
    </header>

    <div id="dataPanel" class="hidden">
      <div class="panel-header">
        <span>Day-by-day comparison</span>
        <button id="dataClose" aria-label="Close">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M18 6 6 18" />
            <path d="M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="chart-label">Riders per day</div>
      <div id="chartRidership" class="chart"></div>
      <div class="chart-label">Revenue over time</div>
      <div id="chartRevenue" class="chart"></div>
    </div>

    <footer id="timeline">
      <div id="nowShowing">
        <span id="nowDate">—</span>
        <span id="nowGame" class="chip"></span>
        <span id="dayTotals" class="day-totals"></span>
      </div>
      <div id="days" class="days"></div>
      <div class="scrubber">
        <button id="playBtn" aria-label="Play">
          <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
            <polygon points="6 3 20 12 6 21 6 3" />
          </svg>
        </button>
        <input id="hour" type="range" min="6" max="23" value="6" step="1" />
        <span id="hourLabel" class="hourLabel">6 AM</span>
      </div>
    </footer>

    <div id="loading">loading live MTA data…</div>

    <script src="sources/mta.js"></script>
    <script src="app.js"></script>
  </body>
</html>
